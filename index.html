  useEffect(() => { taRef.current?.focus(); }, []);

  function handleDrop(e) {
    e.preventDefault(); setIsDragging(false);
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { onSubmit(ev.target.result.trim()); };
    reader.readAsText(file);
  }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box"
        style={{border:isDragging?"2px dashed #4F46E5":"none",backgroundColor:isDragging?"#EEF2FF":"#fff",transition:"all 0.2s"}}
        onDragOver={e=>{e.preventDefault();setIsDragging(true);}}
        onDragLeave={e=>{e.preventDefault();setIsDragging(false);}}
        onDrop={handleDrop}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"18px"}}>
          <div>
            <p style={{margin:0,fontSize:"17px",fontWeight:"800",color:"#333D4B"}}>리포트 추가</p>
            <p style={{margin:"4px 0 0",fontSize:"13px",color:"#8B95A1"}}>텍스트를 붙여넣거나 파일을 드래그 앤 드롭하세요.</p>
          </div>
          <button onClick={onClose} style={{background:"#F2F4F6",border:"none",borderRadius:"8px",width:"28px",height:"28px",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#8B95A1" strokeWidth="3" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <textarea ref={taRef} className="paste-textarea" value={text} onChange={e=>setText(e.target.value)}
          placeholder={"Ctrl+V로 텍스트를 붙여넣으세요.\n\n예시:\nTotal Sent: 65,246\nDelivery Rate: 99.635%"}
          onKeyDown={e=>{if((e.ctrlKey||e.metaKey)&&e.key==="Enter"&&text.trim())onSubmit(text.trim());}}
          style={{backgroundColor:isDragging?"#fff":"#FAFAFA"}}/>
        <div style={{display:"flex",justifyContent:"flex-end",gap:"8px",marginTop:"14px"}}>
          <button className="retry-btn" onClick={onClose}>취소</button>
          <button className="analyze-btn" onClick={()=>{if(text.trim())onSubmit(text.trim());}} disabled={!text.trim()}>분석하기</button>
        </div>
      </div>
    </div>
  );
}

/* ── CSVTable ── */
function CSVTable({ id, title, data, tags, selectedTags, onTagToggle, onResetTags }) {
  const filteredData = data.filter(d => selectedTags.includes(d.groupTag));
  const aggregated = filteredData.reduce((acc, curr) => {
    if (!acc[curr.date]) acc[curr.date]={s:0,f:0,r:0,b1:0,b2:0};
    acc[curr.date].s+=curr.successCount; acc[curr.date].f+=curr.validFailCount;
    acc[curr.date].r+=curr.readCount; acc[curr.date].b1+=curr.button1;
    acc[curr.date].b2+=(curr.button2||0);
    return acc;
  }, {});
  const rows = Object.entries(aggregated).sort((a,b)=>b[0]-a[0]);
  const totals = rows.reduce((acc,[_,vals])=>{
    acc.s+=vals.s; acc.f+=vals.f; acc.r+=vals.r; acc.b1+=vals.b1; acc.b2+=vals.b2; return acc;
  },{s:0,f:0,r:0,b1:0,b2:0});

  const copy = () => {
    const table = document.getElementById(id);
    const totalRow = table?.querySelector("tr.bg-total");
    if (!totalRow) { alert("복사할 합계 데이터가 없습니다."); return; }
    const text = Array.from(totalRow.querySelectorAll("td")).slice(1).map(td=>td.innerText).join("\t");
    navigator.clipboard.writeText(text).then(()=>alert("합계 수치만 복사되었습니다."));
  };

  return (
    <div style={{background:"#fff",padding:"24px",borderRadius:"20px",boxShadow:"0 2px 16px rgba(0,0,0,0.07)",marginBottom:"24px"}}>
      <div className="summary-header">
        <h3 className="summary-title">{title}</h3>
        <button className="copy-btn" onClick={copy}>합계행 복사하기</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
        <p style={{fontSize:"11px",color:"#8B95A1",fontWeight:"bold",margin:0}}>그룹 태그 중복 선택:</p>
        <button onClick={onResetTags}
          style={{display:"flex",alignItems:"center",gap:"3px",background:"#F2F4F6",border:"1px solid #E5E8EC",borderRadius:"6px",padding:"3px 8px",fontSize:"11px",fontWeight:"600",color:"#8B95A1",cursor:"pointer",fontFamily:"inherit"}}
          onMouseEnter={e=>{e.currentTarget.style.background="#E5E8EC";e.currentTarget.style.color="#333D4B";}}
          onMouseLeave={e=>{e.currentTarget.style.background="#F2F4F6";e.currentTarget.style.color="#8B95A1";}}>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          초기화
        </button>
      </div>
      <div className="tag-container">
        {tags.map(tag=>(
          <div key={tag} className={`tag-item ${selectedTags.includes(tag)?'active':''}`} onClick={()=>onTagToggle(tag)}>{tag}</div>
        ))}
      </div>
      <table className="stable" id={id}>
        <thead>
          <tr><th>날짜</th><th>성공</th><th>실패</th><th>읽음</th><th>버튼1 클릭</th><th>버튼2 클릭</th></tr>
        </thead>
        <tbody>
          {rows.map(([date,vals])=>(
            <tr key={date}>
              <td className="bg-light">{date}</td>
              <td>{fmt(vals.s)}</td><td>{fmt(vals.f)}</td><td>{fmt(vals.r)}</td>
              <td>{fmt(vals.b1)}</td><td>{fmt(vals.b2)}</td>
            </tr>
          ))}
          {rows.length>0 && (
            <tr className="bg-total">
              <td className="bg-total">전체 합계</td>
              <td className="bg-total">{fmt(totals.s)}</td><td className="bg-total">{fmt(totals.f)}</td>
              <td className="bg-total">{fmt(totals.r)}</td><td className="bg-total">{fmt(totals.b1)}</td>
              <td className="bg-total">{fmt(totals.b2)}</td>
            </tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* ── DropdownDetailTable ── */
function DropdownDetailTable({ id, title, data, tags, onContextMenu }) {
  const [selectedTag, setSelectedTag] = useState(tags[0]||"");
  const [startDate, setStartDate] = useState("");
  const [endDate,   setEndDate]   = useState("");

  const fmtCSV = (s) => s.replace(/-/g,"");
  const fmtInput = (s) => { if(!s||s.length!==8) return ""; return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`; };

  useEffect(() => {
    if (data&&data.length>0) {
      const all = data.map(d=>d.date.toString()).sort();
      setStartDate(fmtInput(all[0])); setEndDate(fmtInput(all[all.length-1]));
    }
  }, [data]);

  const filteredData = data.filter(d => {
    if (d.groupTag!==selectedTag) return false;
    const dDate=d.date.toString();
    const start=startDate?fmtCSV(startDate):"00000000";
    const end=endDate?fmtCSV(endDate):"99999999";
    return dDate>=start&&dDate<=end;
  });

  let dateSet=new Set(), senderKeySet=new Set(), msgSpecSet=new Set(), chatBubbleSet=new Set();
  let s=0, f_total=0, r=0, b1=0, b2=0, i1=0;
  filteredData.forEach(curr=>{
    if(curr.date) dateSet.add(curr.date);
    if(curr.senderKey) senderKeySet.add(curr.senderKey);
    if(curr.messageSpec) msgSpecSet.add(curr.messageSpec);
    if(curr.chatBubbleType) chatBubbleSet.add(curr.chatBubbleType);
    if(curr.friendType==='F') {
      s+=curr.successCount; f_total+=curr.validFailCount; r+=curr.readCount;
      b1+=curr.button1; if(curr.button2) b2+=curr.button2; if(curr.image1) i1+=curr.image1;
    } else if(curr.friendType==='N') { f_total+=curr.validFailCount; }
  });

  const dateArr = [...dateSet].map(String).sort();
  const dateStr = dateArr.length === 0 ? "-"
    : dateArr.length === 1 ? dateArr[0]
    : `${dateArr[0]} ~ ${dateArr[dateArr.length-1]}`;
  const senderKeyStr=[...senderKeySet].join(', ');
  const msgSpecStr=[...msgSpecSet].join(', '), chatBubbleStr=[...chatBubbleSet].join(', ');

  let periodLabel="전체 기간";
  if(startDate&&endDate) { periodLabel=startDate===endDate?fmtCSV(startDate):`${fmtCSV(startDate)} ~ ${fmtCSV(endDate)}`; }
  else if(startDate) periodLabel=`${fmtCSV(startDate)} ~`;
  else if(endDate) periodLabel=`~ ${fmtCSV(endDate)}`;

  const headerTitle=selectedTag?`${periodLabel} - ${selectedTag} [${senderKeyStr}]`:"선택된 데이터가 없습니다";
  const openRate=s>0?((r/s)*100).toFixed(1):"0.0";
  const btn1Rate=r>0?((b1/r)*100).toFixed(1):"0.0";
  const img1Rate=r>0?((i1/r)*100).toFixed(1):"0.0";

  const tdStyle = (bg, color, bold) => ({
    padding:"12px", fontSize:"13px",
    color: color||"#333D4B",
    fontWeight: bold?"bold":"normal",
    verticalAlign:"middle", textAlign:"center",
    background: bg,
  });

  return (
    <div style={{background:"#fff",padding:"24px",borderRadius:"20px",boxShadow:"0 2px 16px rgba(0,0,0,0.07)",marginBottom:"24px"}}>
      {/* 필터 컨트롤 — 캡처 제외 */}
      <div data-html2canvas-ignore="true" style={{background:"#FAFAFA",border:"1px solid #E5E8EC",borderRadius:"12px",padding:"18px",marginBottom:"20px",display:"flex",flexDirection:"column",gap:"14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
          <div style={{width:"70px",fontSize:"13px",fontWeight:"700",color:"#333D4B"}}>그룹 태그</div>
          <select value={selectedTag} onChange={e=>setSelectedTag(e.target.value)}
            style={{flex:"1",maxWidth:"300px",padding:"8px 12px",borderRadius:"6px",border:"1px solid #C4C9D0",outline:"none",fontSize:"13px",cursor:"pointer",background:"#fff"}}>
            {tags.map(tag=><option key={tag} value={tag}>{tag}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
          <div style={{width:"70px",fontSize:"13px",fontWeight:"700",color:"#333D4B"}}>기간 선택</div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
              style={{padding:"8px 12px",borderRadius:"6px",border:"1px solid #C4C9D0",outline:"none",fontSize:"13px",fontFamily:"inherit",background:"#fff"}}/>
            <span style={{fontSize:"14px",color:"#8B95A1",fontWeight:"700",margin:"0 4px"}}>~</span>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}
              style={{padding:"8px 12px",borderRadius:"6px",border:"1px solid #C4C9D0",outline:"none",fontSize:"13px",fontFamily:"inherit",background:"#fff"}}/>
          </div>
        </div>
      </div>

      {/* 헤더 — 버튼 제거, 우클릭 힌트만 */}
      <div className="summary-header" style={{marginBottom:"16px"}}>
        <h3 className="summary-title">{title}</h3>
        <span style={{fontSize:"11px",color:"#C4C9D0"}}>우클릭 → 이미지 저장/복사</span>
      </div>

      {/* 캡처 대상 영역 */}
      <div id="kakao-report-capture"
        onContextMenu={onContextMenu}
        title="우클릭하면 이미지 저장/복사 메뉴가 나타납니다"
        style={{background:"#F9FAFB",padding:"20px",margin:"-16px",cursor:"context-menu",borderRadius:"12px"}}>
        <div style={{borderRadius:"8px",border:"1px solid #E5E8EC",overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",textAlign:"center",tableLayout:"fixed"}} id={id}>
            <thead>
              <tr><th colSpan="2" style={{background:"#822551",color:"#fff",padding:"12px",fontSize:"14px",fontWeight:"700",verticalAlign:"middle",textAlign:"center"}}>{headerTitle}</th></tr>
              <tr>
                <th style={{background:"#9A2B61",color:"#fff",padding:"10px",fontSize:"13px",width:"35%",borderRight:"1px solid rgba(255,255,255,0.2)",verticalAlign:"middle",textAlign:"center"}}>키</th>
                <th style={{background:"#9A2B61",color:"#fff",padding:"10px",fontSize:"13px",width:"65%",verticalAlign:"middle",textAlign:"center"}}>값</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["groupTag", selectedTag||"-"],
                ["date", dateStr||"-"],
                ["senderKey", senderKeyStr||"-"],
                ["messageSpec", msgSpecStr||"-"],
                ["chatBubbleType", chatBubbleStr||"-"],
                ["successCount", fmt(s)],
                ["validFailCount", fmt(f_total), "#EF4444", true],
                ["readCount", fmt(r)],
                ["button1", fmt(b1)],
                ...(b2>0?[["button2", fmt(b2)]]:[]),
                ["image1", fmt(i1)],
              ].map(([key,val,color,bold],idx)=>(
                <tr key={key} style={{borderBottom:"1px solid #E5E8EC"}}>
                  <td style={tdStyle(idx%2===0?"#F2F4F6":"#fff", null, bold)}>{key}</td>
                  <td style={tdStyle(idx%2===0?"#F2F4F6":"#fff", color, bold)}>{val}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{padding:"16px 20px",background:"#fff",border:"1px solid #E5E8EC",borderRadius:"8px",margin:"20px 8px 0"}}>
          {[
            ["전체 발송 성공 건수", fmt(s), null],
            ["오픈 수", fmt(r), `발송 성공 건수 대비 ${openRate}%`],
            ["버튼1 클릭 수", fmt(b1), `오픈 수 대비 ${btn1Rate}%`],
            ["이미지 링크 클릭 수", fmt(i1), `오픈 수 대비 ${img1Rate}%`],
          ].map(([label,val,sub],idx)=>(
            <div key={idx} style={{padding:"8px 0",fontSize:"14px",color:"#333D4B",borderTop:idx>0?"1px solid #F2F4F6":"none"}}>
              <strong>{label}:</strong> {val}
              {sub&&<span style={{color:"#505967",fontSize:"13px"}}> ({sub})</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── KakaoExternalReport ── */
function KakaoExternalReport({ id, title, onContextMenu }) {
  const [rawText, setRawText] = useState("");
  const [parsedData, setParsedData] = useState(null);
  const [editCols, setEditCols] = useState(null); // 후수정용

  const handleParse = () => {
    if (!rawText.trim()) return;
    const columns = rawText.split('\t').map(s=>s.trim());
    if (columns.length>=14) { setParsedData(columns); setEditCols([...columns]); }
    else alert("데이터 형식이 올바르지 않습니다. 14개 이상의 탭 구분 컬럼이 필요합니다.");
  };

  const headers = ["MID","저니명","버전","모듈","페일백 구분","발송시간",
    {text:"대기중",color:"#F59E0B"},{text:"발송중",color:"#F59E0B"},
    {text:"접수실패",color:"#EF4444"},{text:"친구톡 발송완료",color:"#10B981"},
    {text:"페일백 발송완료",color:"#3B82F6"},{text:"발송실패",color:"#EF4444"},
    {text:"실패코드",color:"#EF4444"},{text:"총 건수",color:"#8B5CF6"}];

  const tdC = {padding:"10px 12px",fontSize:"12px",color:"#333D4B",
    border:"1px solid #F2F4F6",textAlign:"center",
    verticalAlign:"middle",whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums"};

  return (
    <div style={{background:"#fff",padding:"24px",borderRadius:"20px",boxShadow:"0 2px 16px rgba(0,0,0,0.07)",marginBottom:"24px"}}>
      <div className="summary-header" style={{marginBottom:"16px"}}>
        <h3 className="summary-title">{title}</h3>
        {parsedData && <span style={{fontSize:"11px",color:"#C4C9D0"}}>우클릭 → 이미지 저장/복사</span>}
      </div>

      {!parsedData ? (
        <div style={{display:"flex",gap:"8px"}}>
          <input type="text" value={rawText} onChange={e=>setRawText(e.target.value)}
            placeholder="CJ StatusBoard에서 복사한 데이터(한 줄)를 붙여넣으세요."
            style={{flex:1,padding:"10px 12px",borderRadius:"8px",border:"1px solid #E5E8EC",outline:"none",fontSize:"13px"}}
            onKeyDown={e=>{if(e.key==="Enter")handleParse();}}/>
          <button onClick={handleParse} className="analyze-btn" style={{padding:"10px 20px"}}>확인</button>
        </div>
      ) : (
        <div>
          {/* 캡처 대상 영역 — 우클릭 */}
          <div id={id} onContextMenu={onContextMenu} title="우클릭하면 이미지 저장/복사 메뉴가 나타납니다"
            style={{background:"#F9FAFB",padding:"20px",borderRadius:"12px",cursor:"context-menu"}}>
            {/* 가로 스크롤 래퍼 (카드 안에서만 스크롤) */}
            <div style={{overflowX:"auto",borderRadius:"8px",border:"1px solid #E5E8EC"}}>
              <table style={{borderCollapse:"collapse",background:"#fff",minWidth:"900px",width:"100%"}}>
                <thead>
                  <tr>
                    {headers.map((h,i)=>(
                      <th key={i} style={{
                        background:"#F9FAFB",padding:"10px 12px",fontSize:"11px",
                        color: typeof h==="string"?"#8B95A1":h.color,
                        border:"1px solid #F2F4F6",textAlign:"center",
                        whiteSpace:"nowrap",verticalAlign:"middle",fontWeight:"600",
                      }}>{typeof h==="string"?h:h.text}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    {editCols && editCols.slice(0,14).map((col,i)=>(
                      <td key={i} style={{...tdC, fontWeight:(i===0||i>=9)?"bold":"normal", cursor:"text"}}
                        onClick={e=>{
                          const td=e.currentTarget;
                          if(td.querySelector('input')) return;
                          const cur=td.innerText.trim();
                          const inp=document.createElement('input');
                          inp.value=cur;
                          inp.style.cssText="width:100%;min-width:60px;border:none;border-bottom:2px solid #333D4B;outline:none;background:transparent;font-family:inherit;font-size:12px;text-align:center;font-variant-numeric:tabular-nums;color:#333D4B;";
                          td.innerHTML='';
                          td.appendChild(inp);
                          inp.focus(); inp.select();
                          const commit=()=>{
                            const nv=inp.value||cur;
                            const nc=[...editCols]; nc[i]=nv; setEditCols(nc);
                            td.innerHTML=nv;
                          };
                          inp.onblur=commit;
                          inp.onkeydown=e2=>{if(e2.key==='Enter')inp.blur();if(e2.key==='Escape'){td.innerHTML=cur;}};
                        }}>{col}</td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>

            {/* 요약 불릿 */}
            {editCols && (
              <ul style={{fontSize:"15px",color:"#333D4B",lineHeight:"1.8",margin:"16px 0 0",paddingLeft:"24px",listStyleType:"disc"}}>
                <li><strong>전체 모수</strong>: {fmt(parseInt(editCols[13],10))}</li>
                <li><strong>발송 성공</strong>: {fmt(parseInt(editCols[9],10))}</li>
                <li><strong>발송 실패</strong>: {fmt(parseInt(editCols[11],10))}</li>
              </ul>
            )}
          </div>

          <div data-html2canvas-ignore="true" style={{marginTop:"14px",textAlign:"right"}}>
            <button className="retry-btn" onClick={()=>{setParsedData(null);setEditCols(null);setRawText("");}}>데이터 다시 입력</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── 범용 이미지 저장/복사 헬퍼 ── */
function doSaveImage(elementId, filename, fixedWidth) {
  captureElement(elementId, fixedWidth).then(canvas => {
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = filename + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}
function doCopyImage(elementId, fixedWidth) {
  captureElement(elementId, fixedWidth).then(canvas => {
    if (!canvas) return;
    canvas.toBlob(blob => {
      if (!blob) return;
      try {
        const item = new ClipboardItem({ 'image/png': blob });
        navigator.clipboard.write([item])
          .then(() => alert('클립보드에 복사되었습니다!\n(Ctrl+V로 바로 붙여넣기 가능)'))
          .catch(() => alert('브라우저 권한 문제로 클립보드 복사에 실패했습니다.'));
      } catch(err) { console.error(err); }
    }, 'image/png');
  });
}

/* ── 우클릭 컨텍스트 메뉴 ── */
function ContextMenu({ x, y, onSave, onCopy, onClose }) {
  const menuRef = useRef();
  useEffect(() => {
    function handleClick(e) {
      if (menuRef.current && !menuRef.current.contains(e.target)) onClose();
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);
  const [hov, setHov] = useState(null);
  const menuStyle = {
    position:'fixed', left:x, top:y, zIndex:99999,
    background:'#fff', borderRadius:'10px',
    boxShadow:'0 4px 24px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.08)',
    padding:'6px', minWidth:'160px', border:'1px solid #E5E8EC',
  };
  const item = (key, icon, label, handler) => (
    <div style={{display:'flex',alignItems:'center',gap:'9px',padding:'9px 12px',borderRadius:'7px',
      cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#333D4B',
      background:hov===key?'#F2F4F6':'transparent',transition:'background 0.1s'}}
      onMouseEnter={()=>setHov(key)} onMouseLeave={()=>setHov(null)}
      onClick={()=>{handler();onClose();}}>
      {icon}{label}
    </div>
  );
  return (
    <div ref={menuRef} style={menuStyle} onContextMenu={e=>e.preventDefault()}>
      {item('save',
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
        '이미지 저장', onSave
      )}
      {item('copy',
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>,
        '클립보드에 복사', onCopy
      )}
    </div>
  );
}

/* ══════════════════ App ══════════════════ */
function App() {
  // 탭: 'edm' | 'kakao'
  const [activeTab, setActiveTab] = useState('edm');

  // 우클릭 컨텍스트 메뉴 (범용)
  const [ctxMenu, setCtxMenu] = useState(null); // {x, y, elementId, filename, fixedWidth}

  function openCtxMenuFor(elementId, filename, fixedWidth) {
    return (e) => {
      e.preventDefault();
      const x = Math.min(e.clientX, window.innerWidth  - 172);
      const y = Math.min(e.clientY, window.innerHeight - 100);
      setCtxMenu({x, y, elementId, filename, fixedWidth});
    };
  }

  // eDM 상태
  const [slots,     setSlots]     = useState([]);
  const [editData,  setEditData]  = useState(null);
  const [showRawId, setShowRawId] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [edmInput,  setEdmInput]  = useState("");
  const [edmDrag,   setEdmDrag]   = useState(false);
  const [sendTime,  setSendTime]  = useState("2026-05-06 4:00:00 PM");

  // CSV(카카오) 상태
  const [csvData,       setCsvData]       = useState(null);
  const [selectedTags1, setSelectedTags1] = useState([]);
  const [selectedTags2, setSelectedTags2] = useState([]);
  const [tags1,         setTags1]         = useState([]);
  const [tags2,         setTags2]         = useState([]);
  const [tags3,         setTags3]         = useState([]);
  const [kakaoInput,    setKakaoInput]    = useState("");
  const [kakaoDrag,     setKakaoDrag]     = useState(false);

  const doneSlots = slots.filter(s=>s.parsed);
  const doneCount = doneSlots.length;
  const canAddMore = slots.length < MAX_SLOTS;

  useEffect(() => {
    if (doneSlots.length>0) setEditData(JSON.parse(JSON.stringify(mergeReports(doneSlots.map(s=>s.parsed)))));
    else setEditData(null);
  }, [slots]);

  /* ── eDM 핸들러 ── */
  function handleEdmSubmit(rawText) {
    const parsed = parseReport(rawText);
    setSlots(prev=>[...prev,{id:Date.now()+Math.random(),rawText,parsed}]);
    setEdmInput("");
    setShowModal(false);
  }

  function handleEdmDrop(e) {
    e.preventDefault(); setEdmDrag(false);
    const file = e.dataTransfer.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ handleEdmSubmit(ev.target.result.trim()); };
    reader.readAsText(file);
  }

  function resetEdm() { setSlots([]); setEditData(null); setShowRawId(null); setEdmInput(""); }

  /* ── 카카오 CSV 핸들러 ── */
  function handleKakaoSubmit(rawText) {
    const csv = parseCSV(rawText);
    if (!csv) { alert("올바른 CSV 형식이 아닙니다. groupTag, date 컬럼이 필요합니다."); return; }
    setCsvData(csv);
    const soTags = csv.tags.filter(t=>t.startsWith('SO')||t.startsWith('SS')||t.includes('-SS-')||t.includes('TEST'));
    const atTags = csv.tags.filter(t=>t.startsWith('AT')||t.includes('-AT-')||t.includes('TEST'));
    setTags1(soTags); setTags2(atTags);
    setSelectedTags1(soTags.length>0?[soTags[0]]:[]);
    setSelectedTags2(atTags.length>0?[atTags[0]]:[]);
    setTags3(csv.tags);
    setKakaoInput("");
  }

  function handleKakaoDrop(e) {
    e.preventDefault(); setKakaoDrag(false);
    const file = e.dataTransfer.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ handleKakaoSubmit(ev.target.result.trim()); };
    reader.readAsText(file);
  }

  function resetKakao() {
    setCsvData(null); setSelectedTags1([]); setSelectedTags2([]);
    setTags1([]); setTags2([]); setTags3([]); setKakaoInput("");
  }

  const toggleTag=(setter,current)=>(tag)=>{
    if(current.includes(tag)) setter(current.filter(t=>t!==tag));
    else setter([...current,tag]);
  };

  /* ── Excel 다운로드 ── */
  function downloadExcel() {
    if (!editData) return;
    const d=editData;
    const delivered=d.delivered??d.totalSent;
    const uniqueOpens=d.opens?.unique; const uniqueClicks=d.clicks?.unique;
    const calcTotalSent=(delivered!=null&&d.bounces?.total!=null)?delivered+d.bounces.total:d.totalSent;
    const calcDidNotOpen=(delivered!=null&&uniqueOpens!=null)?delivered-uniqueOpens:d.didNotOpen;
    const calcDidNotClick=(delivered!=null&&uniqueClicks!=null)?delivered-uniqueClicks:d.didNotClick;
    const r=(n,den,dec=2)=>(n!=null&&den)?+((n/den)*100).toFixed(dec):null;

    const rows=[
      ["분류","항목","전체 수","고유 수","비율(%)","비고"],
      ["요약","총 발송 건수",calcTotalSent,null,null,null],
      ["요약","총 전송 성공 건수",delivered,null,r(delivered,calcTotalSent,3),null],
      ["요약","반송 총 건수",d.bounces?.total??null,null,r(d.bounces?.total,calcTotalSent),null],
      ["요약","  하드 바운스",d.bounces?.hard??null,null,r(d.bounces?.hard,d.bounces?.total),null],
      ["요약","  블록 바운스",d.bounces?.block??null,null,r(d.bounces?.block,d.bounces?.total),null],
      ["요약","  소프트 바운스",d.bounces?.soft??null,null,r(d.bounces?.soft,d.bounces?.total),null],
      ["활동 지표","오픈 (Opens)",d.opens?.total??null,uniqueOpens??null,r(uniqueOpens,delivered),"고유 발송 수 대비"],
      ["활동 지표","클릭 (Clicks)",d.clicks?.total??null,d.clicks?.unique??null,r(d.clicks?.unique,uniqueOpens),"고유 오픈 수 대비"],
      ["활동 지표","전환 (Conversions)",null,d.conversions?.unique??d.conversions?.total??null,r(d.conversions?.unique??d.conversions?.total,delivered,3),d.conversionAmount!=null?`₩${d.conversionAmount.toLocaleString("ko-KR")}`:"고유 발송 수 대비"],
      ["활동 지표","구독 취소",null,d.unsubscribes?.unique??null,r(d.unsubscribes?.unique,delivered,3),"고유 발송 수 대비"],
      ["미참여","오픈하지 않은 고객",null,calcDidNotOpen??null,r(calcDidNotOpen,delivered),""],
      ["미참여","클릭하지 않은 고객",null,calcDidNotClick??null,r(calcDidNotClick,delivered),""],
    ];

    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:12},{wch:32},{wch:14},{wch:14},{wch:12},{wch:18}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"성과 리포트");
    XLSX.writeFile(wb,`${doneCount>1?`통합 성과 리포트 (${doneCount}개 합산)`:"이메일 성과 리포트"}.xlsx`);
  }

  const copyTableToClipboard=(tableId,skipFirstCol=false)=>{
    const table=document.getElementById(tableId); if(!table) return;
    let text="";
    table.querySelectorAll("tbody tr").forEach(row=>{
      let cols=Array.from(row.querySelectorAll("th,td"));
      if(skipFirstCol) cols=cols.slice(1);
      text+=cols.map(c=>c.innerText).join("\t")+"\n";
    });
    navigator.clipboard.writeText(text).then(()=>alert("복사되었습니다. 엑셀에 붙여넣으세요!"));
  };

  const getSummaryData=()=>{
    if (!editData) return null;
    const d=editData;
    const totalSent=(d.delivered||0)+(d.bounces?.total||0)||d.totalSent||0;
    const delivered=d.delivered||0; const bTotal=d.bounces?.total||0;
    const bHard=d.bounces?.hard||0; const bBlock=d.bounces?.block||0; const bSoft=d.bounces?.soft||0;
    const oUni=d.opens?.unique||0; const oTot=d.opens?.total||0;
    const cUni=d.clicks?.unique||0; const cTot=d.clicks?.total||0;
    const vUni=d.conversions?.unique||d.conversions?.total||0;
    const vTot=d.conversions?.total||0;
    const uUni=d.unsubscribes?.unique||0;
    const convAmount=d.conversionAmount??null;
    const rate=(n,den,dec=2)=>den?((n/den)*100).toFixed(dec)+"%":(0).toFixed(dec)+"%";
    return {totalSent,delivered,bTotal,bHard,bBlock,bSoft,oUni,oTot,cUni,cTot,vUni,vTot,uUni,convAmount,rate};
  };
  const s=getSummaryData();

  const reportTitle=doneCount>1
    ?`통합 성과 분석 리포트 (리포트 ${doneCount}개 합산)`
    :doneCount===1
      ?(toKoreanDate(doneSlots[0].parsed?.publishedOn)?`eDM 성과 분석 리포트 (${toKoreanDate(doneSlots[0].parsed?.publishedOn)})`:"eDM 성과 분석 리포트")
      :"eDM 성과 분석 리포트";

  const emptyCount=MAX_SLOTS-slots.length-(canAddMore?1:0);

  /* ══ 렌더 ══ */
  return (
    <div style={{minHeight:"100vh",background:"#F2F4F6"}}>

      {/* ── 탭 바 ── */}
      <div className="tab-bar">
        <div className="tab-logo">📊 GP 리포트 분석기</div>
        <button
          className={`tab-btn${activeTab==='edm'?' active':''}${doneCount>0?' has-data':''}`}
          onClick={()=>setActiveTab('edm')}>
          <span className="tab-dot"/>
          eDM
          {doneCount>0 && <span className="tab-badge">{doneCount}</span>}
        </button>
        <button
          className={`tab-btn${activeTab==='kakao'?' active':''}${csvData?' has-data':''}`}
          onClick={()=>setActiveTab('kakao')}>
          <span className="tab-dot"/>
          카카오톡
          {csvData && <span className="tab-badge" style={{background:"#F59E0B"}}>CSV</span>}
        </button>
      </div>

      {/* ── 패널 컨테이너 ── */}
      <div style={{maxWidth:"940px",margin:"0 auto",padding:"2rem 1.5rem"}}>

        {/* ════ eDM 탭 ════ */}
        {activeTab==='edm' && (
          <div className="tab-panel">

            {/* 입력 영역: 슬롯 없을 때 */}
            {slots.length===0 && (
              <div
                style={{
                  background:edmDrag?"#EEF2FF":"#fff", borderRadius:"24px",
                  boxShadow:"0 4px 24px rgba(0,0,0,0.08)", padding:"2.5rem 2rem",
                  border:edmDrag?"2px dashed #4F46E5":"2px solid transparent", transition:"all 0.2s",
                  marginBottom:"0"
                }}
                onDragOver={e=>{e.preventDefault();setEdmDrag(true);}}
                onDragLeave={e=>{e.preventDefault();setEdmDrag(false);}}
                onDrop={handleEdmDrop}>
                <p style={{margin:"0 0 6px",fontSize:"20px",fontWeight:"800",color:"#333D4B",letterSpacing:"-0.03em"}}>
                  eDM 발송 결과 분석
                </p>
                <p style={{margin:"0 0 20px",fontSize:"14px",color:"#8B95A1",lineHeight:1.6}}>
                  분석할 리포트 텍스트를 입력해 주세요. <span style={{color:"#C4C9D0"}}>(최대 3개 합산 가능)</span>
                </p>
                <textarea className="paste-textarea" value={edmInput} onChange={e=>setEdmInput(e.target.value)}
                  placeholder={"\n예시:\n\nName: Campaign ABC\nLast Published On: 2026-04-10\nTotal Sent: 65,246\nDelivery Rate: 99.635%"}
                  onKeyDown={e=>{if((e.ctrlKey||e.metaKey)&&e.key==="Enter"&&edmInput.trim()){handleEdmSubmit(edmInput.trim());}}}
                  style={{backgroundColor:edmDrag?"#fff":"#FAFAFA",minHeight:"220px"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"14px"}}>
                  <span style={{fontSize:"11px",color:"#C4C9D0"}}>Ctrl+Enter로 바로 분석</span>
                  <button className="analyze-btn" onClick={()=>{if(edmInput.trim())handleEdmSubmit(edmInput.trim());}} disabled={!edmInput.trim()}>분석하기</button>
                </div>
              </div>
            )}

            {/* 슬롯 있을 때 */}
            {slots.length>0 && (
              <>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                  <p style={{margin:0,fontSize:"14px",fontWeight:"700",color:"#8B95A1"}}>리포트 목록</p>
                  <div style={{display:"flex",gap:"8px"}}>
                    {doneCount>0&&(
                      <button className="retry-btn" onClick={downloadExcel} style={{display:"flex",alignItems:"center",gap:"5px"}}>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M21 15v4a2 2 0 01-2-2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        엑셀 다운로드
                      </button>
                    )}
                    <button className="retry-btn" onClick={resetEdm}>처음으로</button>
                  </div>
                </div>

                <div style={{display:"flex",gap:"12px",marginBottom:"22px"}}>
                  {slots.map((slot,i)=>(
                    <SlotCard key={slot.id} slot={slot} index={i} onRemove={()=>{setSlots(prev=>prev.filter(s=>s.id!==slot.id));if(showRawId===slot.id)setShowRawId(null);}}
                      showRaw={showRawId===slot.id} onToggleRaw={()=>setShowRawId(showRawId===slot.id?null:slot.id)}/>
                  ))}
                  {canAddMore&&(
                    <div className="add-slot-card" onClick={()=>setShowModal(true)}>
                      <div style={{width:"36px",height:"36px",background:"#EBEBEB",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
                      </div>
                      <span style={{fontSize:"12px",fontWeight:"700"}}>리포트 추가 ({slots.length}/{MAX_SLOTS})</span>
                    </div>
                  )}
                  {Array.from({length:Math.max(0,emptyCount)}).map((_,i)=><div key={i} className="empty-slot"/>)}
                </div>

                {doneCount>1&&(
                  <div style={{textAlign:"center"}}>
                    <span className="sum-badge">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
                      리포트 {doneCount}개의 수치를 합산한 결과입니다
                    </span>
                  </div>
                )}

                {doneCount>0&&editData&&(
                  <>
                    <div id="main-report-capture"
                      onContextMenu={openCtxMenuFor('main-report-capture','성과분석리포트',960)}
                      title="우클릭하면 이미지 저장/복사 메뉴가 나타납니다"
                      style={{padding:"16px",margin:"0 -16px",background:"#F2F4F6",borderRadius:"24px",cursor:"context-menu"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
                        <h2 style={{margin:0,fontSize:"18px",fontWeight:"800",color:"#333D4B",letterSpacing:"-0.02em",paddingLeft:"8px"}}>{reportTitle}</h2>
                      </div>
                      <ReportTable data={editData} onDataChange={setEditData}/>
                    </div>
                    <div style={{marginTop:"8px",paddingRight:"4px"}}>
                      <span style={{fontSize:"11px",color:"#C4C9D0"}}>숫자 셀을 클릭하면 직접 수정 · 리포트 영역 우클릭 시 이미지 저장/복사</span>
                    </div>

                    {s&&(
                      <div className="summary-section" style={{marginTop:"30px"}}>
                        <div className="summary-header">
                          <span className="summary-title">SUMMARY</span>
                          <button className="copy-btn" onClick={()=>{
                            const table=document.getElementById('table-summary');
                            const row=table?.querySelector('tbody tr'); if(!row) return;
                            const text=Array.from(row.querySelectorAll('td')).map(td=>td.innerText).join('\t');
                            navigator.clipboard.writeText(text).then(()=>alert('SUMMARY 행이 복사되었습니다.'));
                          }}>행 복사하기</button>
                        </div>
                        <table className="stable" id="table-summary">
                          <thead><tr><th>성공</th><th>반송</th><th>오픈</th><th>클릭</th></tr></thead>
                          <tbody>
                            <tr>
                              <td style={{fontWeight:"700",color:"#333D4B"}}>{fmt(s.delivered)}</td>
                              <td style={{fontWeight:"700",color:"#333D4B"}}>{fmt(s.bTotal)}</td>
                              <td style={{fontWeight:"700",color:"#333D4B"}}>{fmt(s.oUni)}</td>
                              <td style={{fontWeight:"700",color:"#333D4B"}}>{fmt(s.cUni)}</td>
                            </tr>
                          </tbody>
                        </table>

                        <div className="summary-header">
                          <span className="summary-title">발송 결과</span>
                          <button className="copy-btn" onClick={()=>copyTableToClipboard('table-send')}>표 복사하기</button>
                        </div>
                        <div style={{overflowX:"auto"}}>
                        <table className="stable" id="table-send" style={{minWidth:"960px"}}>
                          <thead>
                            <tr>
                              <th>대상수</th><th>건수</th><th>비율</th>
                              <th>성공</th><th>성공률</th>
                              <th>반송</th><th>반송률</th>
                              <th>소프트+블록</th><th>소프트+블록률</th>
                              <th>하드</th><th>하드률</th>
                              <th>발송시각</th><th>상태</th>
                              <th>전환수</th><th>전환매출</th>
                            </tr>
                          </thead>
                          <tbody>
                            <tr>
                              <td>{fmt(s.totalSent)}</td><td>{fmt(s.totalSent)}</td><td>100.00%</td>
                              <td>{fmt(s.delivered)}</td><td>{s.rate(s.delivered,s.totalSent)}</td>
                              <td>{fmt(s.bTotal)}</td><td>{s.rate(s.bTotal,s.totalSent)}</td>
                              <td>{fmt(s.bSoft+s.bBlock)}</td><td>{s.rate(s.bSoft+s.bBlock,s.totalSent)}</td>
                              <td>{fmt(s.bHard)}</td><td>{s.rate(s.bHard,s.totalSent)}</td>
                              <td style={{whiteSpace:"nowrap",minWidth:"160px",cursor:"text",position:"relative"}}
                                onClick={e=>{
                                  const td=e.currentTarget;
                                  if(td.querySelector('input')) return;
                                  const cur=td.innerText.trim();
                                  const inp=document.createElement('input');
                                  inp.value=cur;
                                  inp.style.cssText="width:100%;border:none;border-bottom:2px solid #333D4B;outline:none;background:transparent;font-family:inherit;font-size:12px;text-align:center;font-variant-numeric:tabular-nums;color:#333D4B;";
                                  td.innerHTML='';
                                  td.appendChild(inp);
                                  inp.focus(); inp.select();
                                  const commit=()=>{ setSendTime(inp.value||cur); td.innerHTML=inp.value||cur; };
                                  inp.onblur=commit;
                                  inp.onkeydown=e2=>{if(e2.key==='Enter')inp.blur();if(e2.key==='Escape'){td.innerHTML=cur;setSendTime(cur);}};
                                }}>
                                {sendTime}
                              </td>
                              <td>캠페인 완료</td>
                              <td>{fmt(s.vUni)}</td>
                              <td>{s.convAmount!=null&&s.convAmount!==0 ? `₩ ${fmt(s.convAmount)}` : '₩ 0'}</td>
                            </tr>
                          </tbody>
                        </table>
                        </div>

                        <div className="summary-header">
                          <span className="summary-title">반응 결과</span>
                          <button className="copy-btn" onClick={()=>copyTableToClipboard('table-res',true)}>표 복사하기</button>
                        </div>
                        <table className="stable" id="table-res">
                          <thead>
                            <tr><th>항목</th><th>고유수</th><th>발송대비</th><th>오픈대비</th><th>전체수</th><th>전체발송대비</th><th>오픈대비</th><th>중복</th><th>중복발송대비</th><th>중복오픈대비</th></tr>
                          </thead>
                          <tbody>
                            <tr>
                              <td className="bg-light">Open</td>
                              <td>{fmt(s.oUni)}</td><td>{s.rate(s.oUni,s.delivered)}</td><td>-</td>
                              <td>{fmt(s.oTot)}</td><td>{s.rate(s.oTot,s.delivered)}</td><td>-</td>
                              <td>{fmt(s.oTot-s.oUni)}</td><td>{s.rate(s.oTot-s.oUni,s.delivered)}</td><td>-</td>
                            </tr>
                            <tr>
                              <td className="bg-light">Click</td>
                              <td>{fmt(s.cUni)}</td><td>{s.rate(s.cUni,s.delivered)}</td><td>{s.rate(s.cUni,s.oUni)}</td>
                              <td>{fmt(s.cTot)}</td><td>{s.rate(s.cTot,s.delivered)}</td><td>{s.rate(s.cTot,s.oTot)}</td>
                              <td>{fmt(s.cTot-s.cUni)}</td><td>{s.rate(s.cTot-s.cUni,s.delivered)}</td><td>{s.rate(s.cTot-s.cUni,s.oUni)}</td>
                            </tr>
                            <tr>
                              <td className="bg-light">전환</td>
                              <td>{fmt(s.vUni)}</td><td>{s.rate(s.vUni,s.delivered,3)}</td><td>{s.rate(s.vUni,s.oUni,3)}</td>
                              <td>{fmt(s.vTot)}</td><td>{s.rate(s.vTot,s.delivered,2)}</td><td>-</td><td>-</td><td>-</td><td>-</td>
                            </tr>
                            <tr>
                              <td className="bg-light">수신거부</td>
                              <td>{fmt(s.uUni)}</td><td>{s.rate(s.uUni,s.delivered,3)}</td><td>{s.rate(s.uUni,s.oUni,3)}</td>
                              <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    )}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {/* ════ 카카오 탭 ════ */}
        {activeTab==='kakao' && (
          <div className="tab-panel">

            {/* CSV 없을 때: 입력 */}
            {!csvData && (
              <div
                style={{
                  background:kakaoDrag?"#EEF2FF":"#fff", borderRadius:"24px",
                  boxShadow:"0 4px 24px rgba(0,0,0,0.08)", padding:"2.5rem 2rem",
                  border:kakaoDrag?"2px dashed #4F46E5":"2px solid transparent", transition:"all 0.2s",
                }}
                onDragOver={e=>{e.preventDefault();setKakaoDrag(true);}}
                onDragLeave={e=>{e.preventDefault();setKakaoDrag(false);}}
                onDrop={handleKakaoDrop}>
                <p style={{margin:"0 0 6px",fontSize:"20px",fontWeight:"800",color:"#333D4B",letterSpacing:"-0.03em"}}>
                  알림톡·친구톡 발송 결과 분석
                </p>
                <p style={{margin:"0 0 20px",fontSize:"14px",color:"#8B95A1",lineHeight:1.6}}>
                  CSV 파일을 드래그 앤 드롭하세요. <span style={{color:"#C4C9D0"}}>(groupTag, date 컬럼 필수)</span>
                </p>
                <textarea className="paste-textarea" value={kakaoInput} onChange={e=>setKakaoInput(e.target.value)}
                  placeholder={"\n예시:\n\ngroupTag,date,successCount,validFailCount,readCount,button1,...\nAT,20260403,16,0,5,2,..."}
                  onKeyDown={e=>{if((e.ctrlKey||e.metaKey)&&e.key==="Enter"&&kakaoInput.trim()){handleKakaoSubmit(kakaoInput.trim());}}}
                  style={{backgroundColor:kakaoDrag?"#fff":"#FAFAFA",minHeight:"220px"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"14px"}}>
                  <span style={{fontSize:"11px",color:"#C4C9D0"}}>Ctrl+Enter로 바로 분석</span>
                  <button className="analyze-btn" onClick={()=>{if(kakaoInput.trim())handleKakaoSubmit(kakaoInput.trim());}} disabled={!kakaoInput.trim()}>분석하기</button>
                </div>
              </div>
            )}

            {/* CSV 있을 때: 분석 결과 */}
            {csvData && (
              <>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
                  <p style={{margin:0,fontSize:"18px",fontWeight:"800",color:"#333D4B"}}>카카오톡 메시지 발송 성과 분석</p>
                  <button className="retry-btn" onClick={resetKakao}>처음으로</button>
                </div>

                <CSVTable id="csv-table-1"
                  title={<><span style={{color:"#2563EB"}}>쌤소나이트</span> 캠페인 발송 결과 리포트 (위클리 리포트용)</>}
                  data={csvData.data} tags={tags1} selectedTags={selectedTags1}
                  onTagToggle={toggleTag(setSelectedTags1,selectedTags1)}
                  onResetTags={()=>setSelectedTags1([])}/>
                <CSVTable id="csv-table-2"
                  title={<><span style={{color:"#C53030"}}>아메리칸 투어리스트</span> 캠페인 발송 결과 리포트 (위클리 리포트용)</>}
                  data={csvData.data} tags={tags2} selectedTags={selectedTags2}
                  onTagToggle={toggleTag(setSelectedTags2,selectedTags2)}
                  onResetTags={()=>setSelectedTags2([])}/>
                <DropdownDetailTable id="csv-table-3"
                  title={<><span style={{color:"#CA8A04"}}>KakaoTalk</span> 캠페인 API 집계 (1,2차 리포트용)</>}
                  data={csvData.data} tags={tags3}
                  onContextMenu={openCtxMenuFor('kakao-report-capture','카카오톡_상세분석리포트',800)}/>
                <KakaoExternalReport id="kakao-external-report"
                  title={<><span style={{color:"#10B981"}}>KakaoTalk</span> CJ StatusBoard</>}
                  onContextMenu={openCtxMenuFor('kakao-external-report','카카오톡_외부집계리포트',960)}/>
              </>
            )}
          </div>
        )}

      </div>

      {showModal && <PasteModal onClose={()=>setShowModal(false)} onSubmit={handleEdmSubmit}/>}
      {ctxMenu && (
        <ContextMenu
          x={ctxMenu.x} y={ctxMenu.y}
          onSave={()=>doSaveImage(ctxMenu.elementId, ctxMenu.filename, ctxMenu.fixedWidth)}
          onCopy={()=>doCopyImage(ctxMenu.elementId, ctxMenu.fixedWidth)}
          onClose={()=>setCtxMenu(null)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
